name: Shorts Automator Pipeline

permissions:
  contents: write  # needed to commit the updated topic queue/log back to the repo

on:
  schedule:
    # All times UTC. These correspond to 8am/12pm/4pm/8pm IST (Asia/Kolkata, UTC+5:30).
    # Adjust if you're in a different timezone.
    - cron: "30 2 * * *"   # 08:00 IST
    - cron: "30 6 * * *"   # 12:00 IST
    - cron: "30 10 * * *"  # 16:00 IST
    - cron: "30 14 * * *"  # 20:00 IST
  workflow_dispatch:
    inputs:
      topic:
        description: "Manual topic override (leave blank for auto-trend)"
        required: false
        default: ""
      privacy:
        description: "Upload privacy"
        required: false
        default: "private"
        type: choice
        options: [private, unlisted, public]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45  # bumped from 30 — 4K encoding takes noticeably longer

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/' /etc/ImageMagick-6/policy.xml || true

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore credential files from secrets
        run: |
          echo "${{ secrets.GOOGLE_CLIENT_SECRET_B64 }}" | base64 -d > client_secret.json
          echo "${{ secrets.GOOGLE_TOKEN_PICKLE_B64 }}" | base64 -d > token.pickle

      - name: Write .env
        run: |
          cat <<EOF > .env
          YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          EOF

      - name: Run pipeline (scheduled)
        if: github.event_name == 'schedule'
        run: python main.py --privacy public

      - name: Run pipeline (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TOPIC_ARG=""
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            TOPIC_ARG="--topic \"${{ github.event.inputs.topic }}\""
          fi
          eval python main.py $TOPIC_ARG --privacy "${{ github.event.inputs.privacy }}"

      - name: Upload output video as artifact (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-video-${{ github.run_id }}
          path: output/
          retention-days: 3
          if-no-files-found: ignore

      - name: Commit updated topic queue/log
        # Only runs if the pipeline steps above succeeded — a failed run leaves
        # the queue/log untouched so the same topic gets retried next time.
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in topics_queue.txt posted_topics_log.txt used_clips_log.txt; do
            [ -f "$f" ] && git add "$f"
          done
          git diff --cached --quiet || git commit -m "Update topic queue/log [skip ci]"
          git pull --rebase
          git push
